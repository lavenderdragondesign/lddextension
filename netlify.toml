[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Update this redirect once your CWS link is live:
[[redirects]]
  from = "/install"
  to = "https://YOUR_CHROME_STORE_LINK_HERE"
  status = 302
  force = true
